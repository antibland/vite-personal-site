<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <link rel="canonical" href="/portfolio" />
    <meta http-equiv="refresh" content="0; url=/portfolio" />
    <script>
      // GitHub Pages can’t emit custom 301/308 redirects for arbitrary paths.
      // Shipping this file prevents a hard 404 for old inbound links, and
      // immediately redirects users to the new canonical route.
      window.location.replace("/portfolio");
    </script>
  </head>
  <body>
    <a href="/portfolio">Continue to /portfolio</a>
  </body>
</html>
